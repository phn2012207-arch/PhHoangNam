<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 800px;
            margin: auto;
        }
    </style>

</head>

<body>
    <div>
        <h1 style="width: 100%;">ĐĂNG KÝ THÔNG TIN CÁ NHÂN</h1>
        <table style="width: 100%;">
            <tr>
                <td style="width: 20%;">Tài khoản:</td>
                <td style="width: 80%;">
                    <input type="text" style="width: 300px;" />
                </td>
            </tr>           
            <tr>
                <td style="width: 20%;">Mật khẩu:</td>
                <td style="width: 80%;">
                    <input type="text" style="width: 300px;" />
                </td>
            </tr>
            <tr>
                <td style="width: 20%;">Xác nhận mật khẩu:</td>
                <td style="width: 80%;">
                    <input type="text" style="width: 300px;" />
                </td>
            </tr>
            <tr>
                <td style="width: 20%;">Email:</td>
                <td style="width: 80%;">
                    <input type="text" style="width: 300px;" />
                </td>
            </tr>
            <tr>
                <td style="width: 20%;">Họ tên</td>
                <td style="width: 80%;">
                    <input type="text" style="width: 300px;" />
                </td>
            </tr>
            <tr>
                <td style="width: 20%;">Giới tính:</td>
                <td style="width: 80%;">
                    <input type="radio" name="gt" /> Nam
                    <input type="radio" name="gt" /> Nữ
                </td>
            </tr>
            <tr>
                <td style="width: 20%;">Quê quán</td>
                <td style="width: 80%;">
                    <select>
                        <option>Hà Nội</option>
                        <option>Hải Phòng</option>
                        <option>Quảng Ninh</option>
                </td>
            </tr>
            <tr>
                <td style="width: 20%;">Sở thích</td>
                <td style="width: 80%;">
                    <input type="checkbox" name="sothich" value="dabong" /> Đá bóng
                    <input type="checkbox" name="sothich" value="caulong" />  Cầu lông
                    <input type="checkbox" name="sothich" value="bongro" /> Bóng rổ

                </td>
            </tr>
            <tr>
                <td style="width: 20%;">Ghi chú cá nhân</td>
                <td style="width: 80%;">       
                    <textarea rows="4" cols="50"></textarea>
                    <br><br>
                    <button type="submit">Lưu</button>

                    <button type="reset">Nhập lại</button>
                </td>
            </tr>           
        </table>
    </div>
</body>

</html>
