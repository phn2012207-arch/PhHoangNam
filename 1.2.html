<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bảng điểm học viên</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        
        h2 {
            text-align: center;
        }
        
        table {
            border-collapse: collapse;
            margin: auto;
            width: 90%;
        }
        
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        
        th {
            background-color: #ddd;
        }
    </style>
</head>
<body>

    <h2>BẢNG ĐIỂM HỌC VIÊN</h2>

    <table>
        <tr>
            <th rowspan="2">STT</th>
            <th rowspan="2">Mã học viên</th>
            <th rowspan="2">Họ và tên</th>
            <th colspan="3">Điểm quá trình</th>
            <th rowspan="2">Trung bình quá trình</th>
            <th rowspan="2">KTHP</th>
            <th rowspan="2">Điểm HP</th>
        </tr>
        <tr>
            <th>Đ1</th>
            <th>Đ2</th>
            <th>Đ3</th>
        </tr>
        <tr>
            <td>1</td>
            <td>120101</td>
            <td>Trịnh Văn Tố</td>
            <td>6.0</td>
            <td>7.0</td>
            <td>8.0</td>
            <td>7.0</td>
            <td>8.0</td>
            <td>7.5</td>
        </tr>
        <tr>
            <td>2</td>
            <td>120102</td>
            <td>Nguyễn Thị Lựu</td>
            <td>8.0</td>
            <td>8.0</td>
            <td>8.0</td>
            <td>8.0</td>
            <td>8.0</td>
            <td>8.0</td>
        </tr>
        <tr>
            <td>3</td>
            <td>120103</td>
            <td>Trần Văn Luật</td>
            <td>9.0</td>
            <td>9.0</td>
            <td>9.0</td>
            <td>9.0</td>
            <td>8.0</td>
            <td>8.5</td>
        </tr>
    </table>

</body>
</html>
